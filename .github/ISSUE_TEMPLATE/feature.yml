name: Feature / 기능 개발
description: 새로운 기능 또는 개선 작업을 정의합니다.
title: "feat: "
labels: ["type: feature", "status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        기능은 사용자 가치와 완료 기준이 명확해야 합니다. 구현 방법보다 먼저 문제와 기대 결과를 적어주세요.
  - type: textarea
    id: problem
    attributes:
      label: 문제 / 배경
      description: 어떤 사용자 문제 또는 제품 목표를 해결하나요?
      placeholder: 예) 사용자가 직무를 모르는 상태에서도 진단을 시작할 수 있어야 한다.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 해결 방향
      description: 어떤 기능 또는 흐름으로 해결하나요?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: 완료 기준
      description: QA 가능한 체크리스트로 작성해주세요.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 영역
      options:
        - onboarding
        - resume-analysis
        - recommendation
        - report
        - jobs
        - infra
        - docs
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - P0
        - P1
        - P2
        - P3
    validations:
      required: true
