name: Bug / 버그
description: 재현 가능한 오류를 제보합니다.
title: "fix: "
labels: ["type: bug", "status: triage"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 요약
      description: 어떤 문제가 발생했나요?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 재현 절차
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: 환경
      placeholder: OS, browser, app version, API route 등
